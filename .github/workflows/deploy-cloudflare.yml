name: Deploy Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "workers/converter/**"
      - "apps/control-plane/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-converter:
    name: Deploy Converter Worker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Converter Dependencies
        working-directory: workers/converter
        run: npm install

      - name: Deploy Converter
        working-directory: workers/converter
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  deploy-control-plane:
    name: Deploy Control Plane Worker
    runs-on: ubuntu-latest
    needs: deploy-converter
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/control-plane/package-lock.json

      - name: Install Control Plane Dependencies
        working-directory: apps/control-plane
        run: npm ci

      - name: Build Control Plane
        working-directory: apps/control-plane
        run: npm run build:cf

      - name: Inject KV Namespace IDs
        working-directory: apps/control-plane
        env:
          SUB_KV_NAMESPACE_ID: ${{ secrets.SUB_KV_NAMESPACE_ID }}
          SUB_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.SUB_KV_PREVIEW_NAMESPACE_ID }}
        shell: bash
        run: |
          if [ -z "$SUB_KV_NAMESPACE_ID" ]; then
            echo "Missing required secret: SUB_KV_NAMESPACE_ID"
            exit 1
          fi
          if [ -z "$SUB_KV_PREVIEW_NAMESPACE_ID" ]; then
            echo "Missing required secret: SUB_KV_PREVIEW_NAMESPACE_ID"
            exit 1
          fi
          sed -i "s/REPLACE_WITH_PROD_NAMESPACE_ID/${SUB_KV_NAMESPACE_ID}/g" wrangler.jsonc
          sed -i "s/REPLACE_WITH_PREVIEW_NAMESPACE_ID/${SUB_KV_PREVIEW_NAMESPACE_ID}/g" wrangler.jsonc

      - name: Sync Control Plane Runtime Secrets
        working-directory: apps/control-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONFIG_ASSET_BASE_URL: ${{ secrets.CONFIG_ASSET_BASE_URL }}
          SUBCONVERTER_TIMEOUT_MS: ${{ secrets.SUBCONVERTER_TIMEOUT_MS }}
          PULL_LOG_RETENTION_DAYS: ${{ secrets.PULL_LOG_RETENTION_DAYS }}
          CF_ACCESS_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN }}
          CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
          CF_ACCESS_ISSUER: ${{ secrets.CF_ACCESS_ISSUER }}
        shell: bash
        run: |
          printf "%s" "$CONFIG_ASSET_BASE_URL" | npx wrangler secret put CONFIG_ASSET_BASE_URL
          printf "%s" "$SUBCONVERTER_TIMEOUT_MS" | npx wrangler secret put SUBCONVERTER_TIMEOUT_MS
          printf "%s" "$PULL_LOG_RETENTION_DAYS" | npx wrangler secret put PULL_LOG_RETENTION_DAYS
          printf "%s" "$CF_ACCESS_TEAM_DOMAIN" | npx wrangler secret put CF_ACCESS_TEAM_DOMAIN
          printf "%s" "$CF_ACCESS_AUD" | npx wrangler secret put CF_ACCESS_AUD
          if [ -n "$CF_ACCESS_ISSUER" ]; then
            printf "%s" "$CF_ACCESS_ISSUER" | npx wrangler secret put CF_ACCESS_ISSUER
          fi

      - name: Deploy Control Plane
        working-directory: apps/control-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:cf
